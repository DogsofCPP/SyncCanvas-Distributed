# Prometheus 配置 - SyncCanvas

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Node.js 应用指标（需要 prom-client）
  - job_name: 'synccanvas-server'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Redis 指标（需要 redis_exporter）
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    scrape_interval: 10s

  # MongoDB 指标（需要 mongodb_exporter）
  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:27017']
    scrape_interval: 30s

  # Locust 压测结果
  - job_name: 'locust'
    static_configs:
      - targets: ['localhost:8089']
    scrape_interval: 5s

  # Kafka 指标（需要 kafka_exporter）
  - job_name: 'kafka'
    static_configs:
      - targets: ['localhost:9092']
    scrape_interval: 30s
